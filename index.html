<!DOCTYPE html>
<html lang="ru">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0, viewport-fit=cover">
    <title>LifeOS</title>
    <link rel="preconnect" href="https://fonts.googleapis.com">
    <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin>
    <link href="https://fonts.googleapis.com/css2?family=DM+Sans:wght@600&display=swap" rel="stylesheet">
    
    <style>
        :root {
            --bg: #000000;
            --border: #151515;
            --accent: #ffffff;
            --text-dim: #444444;
            --danger: #ff3b30;
            --font: 'DM Sans', sans-serif;
            --ls: -0.47px;
        }

        * { box-sizing: border-box; -webkit-tap-highlight-color: transparent; }
        
        body {
            font-family: var(--font);
            background-color: var(--bg);
            color: #fff;
            margin: 0;
            padding: 40px 20px;
            letter-spacing: var(--ls);
        }

        .container { width: 100%; max-width: 1000px; margin: 0 auto; }

        /* Чистая навигация без рамок */
        nav {
            display: flex; gap: 20px; margin-bottom: 40px;
            border-bottom: 1px solid var(--border); padding-bottom: 10px;
        }

        .nav-btn {
            background: transparent; color: var(--text-dim);
            border: none; padding: 10px 0; cursor: pointer;
            font-family: var(--font); font-weight: 600;
            font-size: 0.9rem; transition: 0.2s; position: relative;
        }

        .nav-btn.active { color: #fff; }
        .nav-btn.active::after {
            content: ''; position: absolute; bottom: -11px; left: 0;
            width: 100%; height: 2px; background: #fff;
        }

        .section { display: none; }
        .section.active { display: block; animation: fadeIn 0.3s ease; }

        @keyframes fadeIn { from { opacity: 0; } to { opacity: 1; } }

        h1 { font-size: 1.5rem; font-weight: 600; margin: 0 0 30px 0; text-transform: uppercase; letter-spacing: 1px; }

        /* Таблица: убираем лишние карточки, оставляем только линии */
        .table-scroll { overflow-x: auto; width: 100%; margin-bottom: 50px; }
        table { width: 100%; border-collapse: collapse; min-width: 600px; }
        th { color: var(--text-dim); font-size: 0.7rem; padding: 15px 10px; text-transform: uppercase; text-align: center; border-bottom: 1px solid var(--border); }
        td { border-bottom: 1px solid var(--border); padding: 12px 10px; }

        .task-input {
            background: transparent; border: none; outline: none;
            color: #fff; font-family: var(--font); font-weight: 600;
            font-size: 1rem; width: 100%;
        }

        /* Чекбоксы: минимализм */
        .cell-status { width: 20px; height: 20px; margin: 0 auto; display: block; position: relative; cursor: pointer; }
        .cell-status input { opacity: 0; width: 0; height: 0; }
        .box {
            position: absolute; top: 0; left: 0; height: 20px; width: 20px;
            background: transparent; border: 1.5px solid #222; border-radius: 4px; transition: 0.2s;
        }
        input:checked + .box { background: #fff; border-color: #fff; }
        input:checked + .box::after {
            content: ""; position: absolute; left: 6px; top: 2px;
            width: 4px; height: 8px; border: solid #000;
            border-width: 0 2px 2px 0; transform: rotate(45deg);
        }
        .box.failed { border-color: var(--danger); }
        .box.failed::after {
            content: "×"; position: absolute; left: 0; top: -2px; width: 100%;
            text-align: center; color: var(--danger); font-size: 18px;
        }

        /* Сетка аналитики под таблицей */
        .stats-grid { 
            display: grid; 
            grid-template-columns: repeat(auto-fill, minmax(140px, 1fr)); 
            gap: 20px; 
            margin-top: 20px;
        }

        .stat-card {
            background: transparent; border: 1px solid var(--border);
            border-radius: 12px; padding: 20px; display: flex;
            flex-direction: column; align-items: center; transition: 0.3s;
        }

        .progress-ring { transform: rotate(-90deg); }
        .progress-ring__circle { stroke: #111; stroke-width: 3; fill: transparent; }
        .progress-ring__bar {
            stroke: #fff; stroke-width: 3; fill: transparent;
            stroke-dasharray: 125.6; transition: 0.6s cubic-bezier(0.4, 0, 0.2, 1); stroke-linecap: round;
        }

        .percentage { position: absolute; font-size: 0.8rem; margin-top: 18px; font-weight: 600; }
        .stat-label { margin-top: 15px; font-size: 0.75rem; color: var(--text-dim); text-align: center; }

        .btn-add {
            background: #fff; color: #000; border: none; padding: 12px 24px;
            border-radius: 8px; font-weight: 600; cursor: pointer;
            margin-top: 20px; font-family: var(--font); font-size: 0.8rem;
        }

        .btn-del { background: transparent; color: #222; border: none; cursor: pointer; transition: 0.2s; }
        .btn-del:hover { color: var(--danger); }
    </style>
</head>
<body>

<div class="container">
    <nav>
        <button class="nav-btn active" onclick="switchTab('planner')">Planner</button>
        <button class="nav-btn" onclick="switchTab('workout')">Workouts</button>
    </nav>

    <div id="planner" class="section active">
        <h1>Objectives</h1>
        <div class="table-scroll">
            <table>
                <thead>
                    <tr><th style="width:40px"></th><th style="text-align:left">Mission</th><th>M</th><th>T</th><th>W</th><th>T</th><th>F</th><th>S</th><th>S</th></tr>
                </thead>
                <tbody id="planner-body"></tbody>
            </table>
            <button class="btn-add" onclick="addRow('planner')">+ New Objective</button>
        </div>
        <div class="stats-grid" id="planner-stats"></div>
    </div>

    <div id="workout" class="section">
        <h1>Workouts</h1>
        <div class="table-scroll">
            <table>
                <thead>
                    <tr><th style="width:40px"></th><th style="text-align:left">Exercise</th><th>M</th><th>T</th><th>W</th><th>T</th><th>F</th><th>S</th><th>S</th></tr>
                </thead>
                <tbody id="workout-body"></tbody>
            </table>
            <button class="btn-add" onclick="addRow('workout')">+ New Exercise</button>
        </div>
        <div class="stats-grid" id="workout-stats"></div>
    </div>
</div>

<script>
    const CIRCUMFERENCE = 125.6;

    function switchTab(tabId) {
        document.querySelectorAll('.section').forEach(s => s.classList.remove('active'));
        document.querySelectorAll('.nav-btn').forEach(b => b.classList.remove('active'));
        document.getElementById(tabId).classList.add('active');
        event.currentTarget.classList.add('active');
    }

    function getDayIdx() {
        const d = new Date().getDay();
        return d === 0 ? 6 : d - 1;
    }

    function createRow(type, label = '', states = Array(7).fill(null)) {
        const tbody = document.getElementById(`${type}-body`);
        const tr = document.createElement('tr');
        const today = getDayIdx();
        const lastVisit = localStorage.getItem('lastVisit');
        const isNewDay = lastVisit && lastVisit !== new Date().toDateString();

        const finalStates = states.map((s, i) => {
            if (isNewDay && i < today && s === null) return false;
            return s;
        });

        let html = `<td><button class="btn-del" onclick="removeRow(this, '${type}')">×</button></td>
                    <td><input type="text" class="task-input" value="${label}" placeholder="..." oninput="updateStats('${type}')"></td>`;
        
        finalStates.forEach((state) => {
            let cls = state === false ? 'failed' : '';
            let chk = state === true ? 'checked' : '';
            html += `<td>
                <label class="cell-status">
                    <input type="checkbox" ${chk} onchange="this.nextElementSibling.classList.remove('failed'); updateStats('${type}')">
                    <span class="box ${cls}"></span>
                </label>
            </td>`;
        });
        
        tr.innerHTML = html;
        tbody.appendChild(tr);
        updateStats(type);
    }

    function addRow(type) { createRow(type); }
    function removeRow(btn, type) { btn.closest('tr').remove(); updateStats(type); }

    function updateStats(type) {
        const rows = document.querySelectorAll(`#${type}-body tr`);
        const grid = document.getElementById(`${type}-stats`);
        grid.innerHTML = '';
        const data = [];

        rows.forEach(tr => {
            const label = tr.querySelector('.task-input').value || '...';
            const boxes = tr.querySelectorAll('.cell-status');
            const states = Array.from(boxes).map(b => {
                if(b.querySelector('input').checked) return true;
                if(b.querySelector('.box').classList.contains('failed')) return false;
                return null;
            });

            data.push({ label, states });
            const done = states.filter(s => s === true).length;
            const pct = Math.round((done / 7) * 100);
            const offset = CIRCUMFERENCE - (pct / 100) * CIRCUMFERENCE;

            grid.innerHTML += `
                <div class="stat-card">
                    <div style="position:relative; display:flex; justify-content:center; align-items:center;">
                        <svg class="progress-ring" width="50" height="50">
                            <circle class="progress-ring__circle" cx="25" cy="25" r="20"></circle>
                            <circle class="progress-ring__bar" cx="25" cy="25" r="20" style="stroke-dashoffset:${offset}"></circle>
                        </svg>
                        <div class="percentage">${pct}%</div>
                    </div>
                    <div class="stat-label">${label}</div>
                </div>`;
        });
        localStorage.setItem(`${type}Data`, JSON.stringify(data));
        localStorage.setItem('lastVisit', new Date().toDateString());
    }

    function load(type) {
        const saved = JSON.parse(localStorage.getItem(`${type}Data`));
        if (saved) saved.forEach(item => createRow(type, item.label, item.states));
        else createRow(type, type === 'planner' ? 'Workout' : 'Training');
    }

    load('planner');
    load('workout');
</script>
</body>
</html>
